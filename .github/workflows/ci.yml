# CI Pipeline — runs on every PR and push to main
# Learn more: https://docs.github.com/en/actions/writing-workflows

name: CI
# TRIGGERS: When should this workflow run?
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel redundant runs when new commits are pushed to the same PR/branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# JOBS: Independent units of work that run in parallel
jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      # 1. Check out the code so the runner has access to it
      - uses: actions/checkout@v6

      # 2. Set up Node.js with caching to speed up installs
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      # 3. Install dependencies (ci = clean install, respects lockfile exactly)
      - run: npm ci

      # 4. Run the lint check
      - run: npm run lint

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run typecheck

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      # --run flag makes vitest run once and exit (instead of watch mode)
      - run: npm test -- --run
    env:
      JWT_SECRET: 68h6iqYKjq6MKH54cEJoswJftyNBFa5ixMU5S6BbzuGbv+m2UlkXCg==
      JWT_EXPIRY: "3600"
      JWT_AUD: https://Keppel.App
      JWT_ISS: Keppel
      REFRESH_TOKEN_EXPIRY: "2592000"
      DATABASE_URL: postgresql://user:pass@localhost:5432/testdb
      WS_PORT: "3002"
      ENCRYPTION_KEY: "0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef"
      GOOGLE_CLIENT_ID: dummy-client-id
      GOOGLE_CLIENT_SECRET: dummy-client-secret
      GOOGLE_REDIRECT_URI: http://localhost:3000/api/auth/google/callback
      RESEND_API_KEY: re_dummy_key
      NEXT_PUBLIC_API_URL: http://localhost:3000
      NEXT_PUBLIC_WS_URL: ws://localhost:3002/ws
      REDIS_URL: redis://127.0.0.1:6379

  build:
    name: Build
    runs-on: ubuntu-latest
    # This job waits for lint, typecheck, and test to pass first.
    # Why: no point building if basic checks fail — saves CI minutes.
    needs: [lint, typecheck, test]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Audit dependencies
        run: npm audit --audit-level=high
      - run: npm run build
    # Make dummy env vars available so Next.js build doesn't fail
    # on missing NEXT_PUBLIC_* variables (it inlines them at build time)
    env:
      NEXT_PUBLIC_API_URL: http://localhost:3000
      NEXT_PUBLIC_WS_URL: ws://localhost:3002
      JWT_SECRET: 68h6iqYKjq6MKH54cEJoswJftyNBFa5ixMU5S6BbzuGbv+m2UlkXCg==
      JWT_EXPIRY: "3600"
      JWT_AUD: https://Keppel.App
      JWT_ISS: Keppel
      REFRESH_TOKEN_EXPIRY: "2592000"
      DATABASE_URL: postgresql://user:pass@localhost:5432/testdb
      WS_PORT: "3002"
      ENCRYPTION_KEY: "0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef"
      GOOGLE_CLIENT_ID: dummy-client-id
      GOOGLE_CLIENT_SECRET: dummy-client-secret
      GOOGLE_REDIRECT_URI: http://localhost:3000/api/auth/google/callback
      RESEND_API_KEY: re_dummy_key
      REDIS_URL: redis://127.0.0.1:6379
